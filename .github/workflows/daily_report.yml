name: Daily AI News Agent

on:
  schedule:
    # 每天北京时间 08:00 和 20:00 各运行一次
    # 分钟（0） 小时（0,12） 日 月 周
    - cron: '45 2 * * *'
  workflow_dispatch: # 保持这个选项，方便你随时手动点击运行测试 

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute News Script
        env:
          API_KEY: ${{ secrets.API_KEY }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}     # 新增
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }} # 新增
        run: python main.py
